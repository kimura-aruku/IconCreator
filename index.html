<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon Creator</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <h1>ICON <span>CREATOR</span></h1>

  <div class="card">
    <span class="label">ソース画像</span>
    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" accept=".png,.svg,.jpg,.jpeg">
      <span class="dropzone-icon">⬆</span>
      <div class="dropzone-text">PNG / SVG をドロップ<br>またはクリックして選択</div>
    </div>
    <div class="file-selected" id="fileName" aria-live="polite">.icoファイルを作成したい画像を選択してください</div>
  </div>

  <div class="card">
    <div class="section-header">
      <span class="label">.icoファイルに含めるサイズ</span>
      <div class="selection-actions">
        <button class="selection-action" id="selectAllBtn" type="button">全選択</button>
        <button class="selection-action" id="clearAllBtn" type="button">全解除</button>
      </div>
    </div>
    <div class="sizes-grid" id="sizesGrid"></div>
  </div>

  <button class="btn" id="createBtn" disabled>Create .ico</button>
  <div class="message" id="message"></div>
</div>

<script>
const SIZES = [16, 24, 32, 48, 64, 128, 256];

// サイズチェックボックス生成
const grid = document.getElementById('sizesGrid');
SIZES.forEach(s => {
  const item = document.createElement('div');
  item.className = 'size-item';
  item.innerHTML = `<input type="checkbox" id="s${s}" value="${s}" checked><label for="s${s}">${s}x${s}</label>`;
  grid.appendChild(item);
});

const fileInput = document.getElementById('fileInput');
const dropzone = document.getElementById('dropzone');
const fileNameEl = document.getElementById('fileName');
const createBtn = document.getElementById('createBtn');
const messageEl = document.getElementById('message');
const selectAllBtn = document.getElementById('selectAllBtn');
const clearAllBtn = document.getElementById('clearAllBtn');

let selectedFile = null;

fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) setFile(fileInput.files[0]);
});

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
});

function setFile(f) {
  selectedFile = f;
  fileNameEl.textContent = f.name;
  createBtn.disabled = false;
  hideMessage();
}

function hideMessage() { messageEl.className = 'message'; messageEl.textContent = ''; }
function showMessage(text, type) { messageEl.className = `message ${type}`; messageEl.textContent = text; }

function setAllSizes(checked) {
  document.querySelectorAll('#sizesGrid input[type="checkbox"]').forEach(input => {
    input.checked = checked;
  });
  hideMessage();
}

selectAllBtn.addEventListener('click', () => setAllSizes(true));
clearAllBtn.addEventListener('click', () => setAllSizes(false));

// ---- ICO builder ----
function buildIco(entries) {
  // entries: [{width, height, pngBuffer: ArrayBuffer}]
  const count = entries.length;
  const FILE_HEADER = 6;
  const DIR_SIZE = 16;
  const headerSize = FILE_HEADER + DIR_SIZE * count;
  const totalSize = headerSize + entries.reduce((s, e) => s + e.pngBuffer.byteLength, 0);

  const buf = new ArrayBuffer(totalSize);
  const view = new DataView(buf);
  const bytes = new Uint8Array(buf);

  view.setUint16(0, 0, true);
  view.setUint16(2, 1, true);
  view.setUint16(4, count, true);

  let dataOffset = headerSize;
  entries.forEach((entry, i) => {
    const d = FILE_HEADER + DIR_SIZE * i;
    view.setUint8(d,   entry.width  >= 256 ? 0 : entry.width);
    view.setUint8(d+1, entry.height >= 256 ? 0 : entry.height);
    view.setUint8(d+2, 0);
    view.setUint8(d+3, 0);
    view.setUint16(d+4, 0, true);
    view.setUint16(d+6, 32, true);
    view.setUint32(d+8,  entry.pngBuffer.byteLength, true);
    view.setUint32(d+12, dataOffset, true);
    bytes.set(new Uint8Array(entry.pngBuffer), dataOffset);
    dataOffset += entry.pngBuffer.byteLength;
  });
  return buf;
}

// 画像をCanvasでリサイズしてPNG ArrayBufferを得る
function renderToPng(img, size) {
  return new Promise(resolve => {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, size, size);
    ctx.drawImage(img, 0, 0, size, size);
    canvas.toBlob(blob => {
      blob.arrayBuffer().then(resolve);
    }, 'image/png');
  });
}

// SVGをImageとして読み込む
function loadSvg(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      // SVGはサイズ指定がないと小さくなるので大きめに
      const blob = new Blob([e.target.result], {type: 'image/svg+xml'});
      const url = URL.createObjectURL(blob);
      img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
      img.onerror = reject;
      img.src = url;
    };
    reader.onerror = reject;
    reader.readAsText(file);
  });
}

// PNG/JPGをImageとして読み込む
function loadImage(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
    img.onerror = reject;
    img.src = url;
  });
}

createBtn.addEventListener('click', async () => {
  if (!selectedFile) return;

  const sizes = [...document.querySelectorAll('#sizesGrid input:checked')].map(c => parseInt(c.value));
  if (sizes.length === 0) { showMessage('サイズを1つ以上選択してください', 'error'); return; }

  createBtn.disabled = true;
  createBtn.textContent = 'Creating...';
  hideMessage();

  try {
    const ext = selectedFile.name.split('.').pop().toLowerCase();
    const img = ext === 'svg' ? await loadSvg(selectedFile) : await loadImage(selectedFile);

    const entries = await Promise.all(
      sizes.map(async size => ({
        width: size,
        height: size,
        pngBuffer: await renderToPng(img, size)
      }))
    );

    const icoBuffer = buildIco(entries);
    const blob = new Blob([icoBuffer], { type: 'image/x-icon' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const baseName = selectedFile.name.replace(/\.[^.]+$/, '');
    a.download = `${baseName}.ico`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);

    showMessage('生成完了。ダウンロードが始まります。', 'success');
  } catch (e) {
    showMessage('変換中にエラーが発生しました: ' + e.message, 'error');
  } finally {
    createBtn.disabled = false;
    createBtn.textContent = 'Create .ico';
  }
});
</script>
</body>
</html>
